<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="rndP.png">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <header class="app-header">
        <p class="eyebrow">Security Tool</p>
        <h1 id="app-title">Random Password Generator</h1>
      </header>

      <section class="generator-panel">
        <div class="mode-row" role="group" aria-label="Password generation mode">
          <button class="mode-button active" type="button" data-mode="random">Random</button>
          <button class="mode-button" type="button" data-mode="memorable">Memorable</button>
          <button class="mode-button" type="button" data-mode="phrase">Phrase</button>
        </div>

        <div class="password-row">
          <div class="password-field" aria-live="polite">
            <output id="passwordOutput" class="password-output"></output>
            <span id="strengthBadge" class="strength-badge">Strong</span>
            <button id="refreshButton" class="icon-button" type="button" aria-label="Generate a new password">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 12a9 9 0 1 1-2.64-6.36" />
                <path d="M21 3v6h-6" />
              </svg>
            </button>
          </div>
          <button id="copyButton" class="copy-button" type="button">Copy</button>
        </div>

        <div id="personalControls" class="personal-controls hidden">
          <label class="text-option">
            <span id="customInputLabel">Your words</span>
            <input id="customInput" type="text" autocomplete="off" spellcheck="false" />
          </label>
          <label id="serviceField" class="text-option">
            <span>Service</span>
            <input id="serviceInput" type="text" autocomplete="off" spellcheck="false" placeholder="github, bank, mail" />
          </label>
          <p id="personalHint" class="privacy-note"></p>
        </div>

        <div id="variantPanel" class="variant-panel hidden" aria-label="Password variations">
          <p>Variations</p>
          <div id="variantList" class="variant-list"></div>
        </div>

        <div class="control-row length-row">
          <p>Password length: <strong id="lengthValue">10</strong></p>
          <div class="range-control">
            <button id="decreaseButton" class="circle-button" type="button" aria-label="Decrease password length">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M5 12h14" />
              </svg>
            </button>
            <input id="lengthRange" type="range" min="8" max="32" value="16" aria-label="Password length" />
            <button id="increaseButton" class="circle-button" type="button" aria-label="Increase password length">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
            </button>
          </div>
        </div>

        <div class="control-row character-row">
          <p>Characters used:</p>
          <fieldset class="checkbox-group" aria-label="Character types">
            <label class="check-option">
              <input type="checkbox" data-set="uppercase" checked />
              <span class="checkmark"></span>
              <span>ABC</span>
            </label>
            <label class="check-option">
              <input type="checkbox" data-set="lowercase" checked />
              <span class="checkmark"></span>
              <span>abc</span>
            </label>
            <label class="check-option">
              <input type="checkbox" data-set="numbers" checked />
              <span class="checkmark"></span>
              <span>123</span>
            </label>
            <label class="check-option">
              <input type="checkbox" data-set="symbols" checked />
              <span class="checkmark"></span>
              <span>#$&amp;</span>
            </label>
          </fieldset>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
